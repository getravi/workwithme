name: CI

# SECURITY NOTE — Action pinning:
# All third-party GitHub Actions below should be pinned to an immutable commit SHA
# instead of a mutable tag (e.g. @v4, @stable). Mutable tags can be silently
# redirected to malicious code if the upstream repo is compromised (supply-chain attack).
#
# To pin, replace each "@<tag>" with "@<full-40-char-SHA>  # <tag>" using:
#   gh api /repos/<owner>/<repo>/git/refs/tags/<tag>   (get the tag SHA)
#   gh api /repos/<owner>/<repo>/git/tags/<tag-sha>    (dereference to commit SHA)
#
# Example:
#   uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
#
# Actions to pin (run `gh api` above for each, or use tool like `pin-github-action`):
#   actions/checkout@v4
#   pnpm/action-setup@v4
#   actions/setup-node@v4
#   dtolnay/rust-toolchain@stable
#   Swatinem/rust-cache@v2
#   actions/cache@v4
#   tauri-apps/tauri-action@v0   ← especially this; @v0 is an extremely broad mutable tag

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Type Check
    runs-on: ubuntu-22.04
    # Least-privilege: this job only needs to read repo contents
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check frontend
        run: pnpm exec tsc --noEmit

      - name: Install sidecar dependencies
        run: pnpm install --frozen-lockfile
        working-directory: sidecar

      - name: Type-check sidecar
        run: pnpm exec tsc --noEmit -p tsconfig.sidecar.json

      - name: Run sidecar tests
        run: pnpm exec vitest run
        working-directory: sidecar

      - name: Audit frontend dependencies
        run: pnpm audit --audit-level=moderate
        # TODO: remove continue-on-error once all audit findings are reviewed/resolved
        continue-on-error: true

      - name: Audit sidecar dependencies
        run: pnpm audit --audit-level=moderate
        working-directory: sidecar
        # TODO: remove continue-on-error once all audit findings are reviewed/resolved
        continue-on-error: true

  build:
    name: Build (${{ matrix.platform }})
    needs: checks
    permissions:
      contents: write  # Required for tauri-action to create/update releases on tag pushes
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: macos-latest
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Node.js binaries (for SEA build)
        uses: actions/cache@v4
        with:
          path: sidecar/.node-cache
          key: node-sea-${{ runner.os }}-v20.20.0

      - name: Install sidecar dependencies
        run: pnpm install --frozen-lockfile
        working-directory: sidecar

      - name: Build sidecar SEA binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            pnpm exec node scripts/build-binary.mjs --targets aarch64-apple-darwin,x86_64-apple-darwin
          else
            pnpm exec node scripts/build-binary.mjs
          fi
        working-directory: sidecar

      - name: Build Tauri app (non-tag)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Build Tauri app and publish release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "WorkWithMe ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
