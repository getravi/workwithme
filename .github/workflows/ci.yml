name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Type Check
    runs-on: ubuntu-22.04
    # Least-privilege: this job only needs to read repo contents
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check frontend
        run: pnpm exec tsc --noEmit

      - name: Install sidecar dependencies
        run: pnpm install --frozen-lockfile
        working-directory: sidecar

      - name: Type-check sidecar
        run: pnpm exec tsc --noEmit -p tsconfig.sidecar.json

      - name: Run sidecar tests
        run: pnpm exec vitest run
        working-directory: sidecar

      - name: Audit frontend dependencies
        run: pnpm audit --audit-level=moderate

      - name: Audit sidecar dependencies
        run: pnpm audit --audit-level=moderate
        working-directory: sidecar

  build:
    name: Build (${{ matrix.platform }})
    needs: checks
    permissions:
      contents: write  # Required for tauri-action to create/update releases on tag pushes
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: macos-latest
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9  # stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Node.js binaries (for SEA build)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: sidecar/.node-cache
          key: node-sea-${{ runner.os }}-v20.20.0

      - name: Install sidecar dependencies
        run: pnpm install --frozen-lockfile
        working-directory: sidecar

      - name: Build sidecar SEA binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            pnpm exec node scripts/build-binary.mjs --targets aarch64-apple-darwin,x86_64-apple-darwin
          else
            pnpm exec node scripts/build-binary.mjs
          fi
        working-directory: sidecar

      - name: Build Tauri app (non-tag)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5  # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Build Tauri app and publish release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5  # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "WorkWithMe ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
